<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Grade Calculator</title>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    color:#333;
    transition:.3s;
}

.container{
    max-width:700px;
    margin:30px auto;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    color:#0d6efd;
    margin-bottom:20px;
}

h2{
    color:#ffffff;
    margin-top:20px;
    margin-bottom:15px;
    font-size:28px;
    border-bottom:2px solid #0d6efd;
    padding-bottom:5px;
}

label{
    display:block;
    margin-top:12px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

.buttons{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:20px;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:5px;
    background:#0d6efd;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#084298;
}

#studentDetails,
#output{
    margin-top:25px;
    padding:20px;
    border-radius:8px;
    background:#f8f9fa;
}

.dark{
    background:#222;
    color:#fff;
}

.dark .container{
    background:#333;
}

.dark input{
    background:#FFFFFF;
    color:white;
    border:1px solid #777;
}

.dark #studentDetails,
.dark #output{
    background:#444;
}

@media(max-width:600px){

.buttons{
    flex-direction:column;
}

}
@media print {

    body {
        background: white !important;
    }

    body * {
        visibility: hidden;
    }

    #studentDetails,
    #studentDetails *,
    #output,
    #output * {
        visibility: visible;
    }

    #studentDetails {
        position: absolute;
        top: 20px;
        left: 20px;
        width: calc(100% - 40px);
        padding: 25px;
        border: 2px solid #0d6efd;
        border-radius: 10px;
        background: white !important;
        color: black !important;
        font-family: Arial, sans-serif;
    }

    #output {
        position: absolute;
        top: 300px; /* Increase if student details become longer */
        left: 20px;
        width: calc(100% - 40px);
        padding: 25px;
        border: 2px solid #0d6efd;
        border-radius: 10px;
        background: white !important;
        color: black !important;
        font-family: Arial, sans-serif;
    }

    #studentDetails h2,
    #output h2 {
        text-align: center;
        color: #0d6efd;
        border-bottom: 2px solid #0d6efd;
        padding-bottom: 10px;
        margin-bottom: 20px;
    }

    #studentDetails p,
    #output p {
        font-size: 18px;
        margin: 10px 0;
    }

    #studentDetails b,
    #output b {
        color: #0d6efd;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>Student Grade Calculator</h1>

<h2>Student Details</h2>

<label>Name</label>
<input type="text" id="name">

<label>Roll Number</label>
<input type="text" id="roll">

<label>Course</label>
<input type="text" id="course">

<label>Age</label>
<input type="number" id="age">
<h2>Subject Marks</h2>

<label>Subject 1</label>
<input type="number" id="m1" min="0" max="100">

<label>Subject 2</label>
<input type="number" id="m2" min="0" max="100">

<label>Subject 3</label>
<input type="number" id="m3" min="0" max="100">

<label>Subject 4</label>
<input type="number" id="m4" min="0" max="100">

<label>Subject 5</label>
<input type="number" id="m5" min="0" max="100">

<div class="buttons">

<button onclick="runProgram()">
Calculate
</button>

<button onclick="resetForm()">
Reset
</button>

<button onclick="printResult()">
Print Result
</button>

<button onclick="toggleDarkMode()">
🌙 Dark Mode
</button>

</div>

<div id="studentDetails"></div>

<div id="output"></div>

</div>

<script src="script.js"></script>

</body>
</html>
