<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Information & Grade Calculator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:#0d6efd;
margin-bottom:20px;
}

h2{
margin-top:20px;
color:#333;
border-bottom:2px solid #0d6efd;
padding-bottom:5px;
}

#output{
margin-top:20px;
padding:15px;
background:#eef5ff;
border-radius:8px;
line-height:1.8;
}

pre{
background:#222;
color:#0f0;
padding:15px;
overflow:auto;
border-radius:8px;
margin-top:10px;
}

button{
margin-top:20px;
padding:10px 20px;
background:#0d6efd;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#084298;
transform:scale(1.05);
}
</style>

</head>

<body>

<div class="container">

<h1>Student Information & Grade Calculator</h1>

<p>
This program demonstrates JavaScript variables,
operators, conditions, loops and basic programs.
Open the browser console to view console output.
</p>

<div id="output"></div>

<button onclick="runProgram()">
Run Program
</button>

</div>

<script src="script.js"></script>

</body>
  </html>
